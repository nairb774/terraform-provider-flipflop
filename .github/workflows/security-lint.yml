name: Security Linting

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  zizmor:
    name: GitHub Actions Security (zizmor)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # To upload to GitHub Advanced Security
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Verify shellcheck is available
        run: |
          # Verify shellcheck is available for zizmor to use
          # shellcheck is pre-installed on GitHub Actions ubuntu runners
          shellcheck --version

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          persona: pedantic
